<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交成功 - 中华文化促进会天津代表机构</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg, #f5f0e8 0%, #e8dcc8 100%);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 540px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(139, 69, 19, 0.12);
  overflow: hidden;
  animation: slideUp 0.4s ease;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.header {
  background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
  color: #fff;
  text-align: center;
  padding: 36px 20px 28px;
}
.header .org-name {
  font-size: 13px;
  letter-spacing: 3px;
  opacity: 0.85;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 22px;
  letter-spacing: 2px;
}
.body {
  padding: 32px 24px;
  text-align: center;
}
.success-icon {
  width: 60px; height: 60px;
  background: #4CAF50;
  border-radius: 50%;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
}
.success-icon svg { width: 30px; height: 30px; }
.body h2 {
  font-size: 20px;
  color: #333;
  margin-bottom: 8px;
}
.body .hint {
  font-size: 14px;
  color: #666;
  margin-bottom: 24px;
  line-height: 1.6;
}
.divider {
  border: none;
  border-top: 1px dashed #ddd;
  margin: 24px 0;
}
.payment-section {
  background: #fdfaf5;
  border-radius: 12px;
  padding: 24px 16px;
  border: 1px solid #f0e6d2;
}
.payment-section h3 {
  font-size: 17px;
  color: #8B0000;
  margin-bottom: 8px;
}
.payment-section .fee {
  font-size: 28px;
  font-weight: 700;
  color: #333;
  margin-bottom: 4px;
}
.payment-section .fee .unit {
  font-size: 14px;
  font-weight: 400;
  color: #999;
}
.payment-section .fee-note {
  font-size: 12px;
  color: #999;
  margin-bottom: 20px;
}
.payment-qr {
  width: 220px;
  height: 220px;
  margin: 0 auto 12px;
  display: block;
  border: 1px solid #eee;
  border-radius: 8px;
}
.bank-info {
  font-size: 13px;
  color: #555;
  line-height: 1.8;
  text-align: left;
  display: inline-block;
  margin-bottom: 8px;
}
.qr-tip {
  font-size: 13px;
  color: #888;
  line-height: 1.6;
}
.qr-tip strong { color: #8B0000; }
.note-box {
  background: #fff8e1;
  border-left: 3px solid #f9a825;
  padding: 12px 16px;
  border-radius: 0 8px 8px 0;
  margin-top: 16px;
  text-align: left;
  font-size: 12px;
  color: #8d6e00;
  line-height: 1.6;
}
.close-btn {
  display: inline-block;
  margin-top: 24px;
  background: #8B0000;
  color: #fff;
  text-decoration: none;
  padding: 12px 36px;
  border-radius: 24px;
  font-size: 15px;
  font-weight: 600;
  transition: transform 0.15s;
}
.close-btn:hover { transform: translateY(-2px); }
@media (max-width: 480px) {
  .body { padding: 24px 16px; }
  .payment-qr { width: 200px; height: 200px; }
}
</style>
