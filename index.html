<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中华文化促进会天津代表机构 - 会员登记表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg, #f5f0e8 0%, #e8dcc8 100%);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 680px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(139, 69, 19, 0.12);
  overflow: hidden;
}
.header {
  background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
  color: #fff;
  text-align: center;
  padding: 36px 20px 28px;
}
.header .logo-text {
  font-size: 14px;
  letter-spacing: 4px;
  opacity: 0.85;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
}
.header .subtitle {
  font-size: 13px;
  margin-top: 8px;
  opacity: 0.8;
}
.form-body { padding: 28px 24px 12px; }
.form-section {
  margin-bottom: 24px;
}
.section-title {
  font-size: 15px;
  font-weight: 600;
  color: #8B0000;
  border-left: 4px solid #8B0000;
  padding-left: 10px;
  margin-bottom: 16px;
}
.form-group {
  margin-bottom: 16px;
}
.form-row {
  display: flex;
  gap: 14px;
}
.form-row .form-group { flex: 1; }
label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: #333;
  margin-bottom: 6px;
}
label .required { color: #c0392b; }
input[type="text"],
input[type="tel"],
input[type="email"],
input[type="date"],
select,
textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #fafafa;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #8B0000;
  box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.08);
  background: #fff;
}
textarea { resize: vertical; min-height: 80px; }
.radio-group, .checkbox-group {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  padding-top: 4px;
}
.radio-group label, .checkbox-group label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 400;
  cursor: pointer;
  margin-bottom: 0;
}
input[type="radio"], input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #8B0000;
  cursor: pointer;
}
.form-footer {
  padding: 20px 24px 28px;
  text-align: center;
}
.submit-btn {
  background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
  color: #fff;
  border: none;
  padding: 14px 48px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 30px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.2s;
  font-family: inherit;
  letter-spacing: 2px;
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(139, 0, 0, 0.3);
}
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.note {
  font-size: 12px;
  color: #999;
  margin-top: 12px;
  line-height: 1.6;
}
@media (max-width: 480px) {
  .form-row { flex-direction: column; gap: 0; }
  .header h1 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-text">中华文化促进会天津代表机构</div>
    <h1>会员登记表</h1>
    <div class="subtitle">CHINA CULTURE PROMOTION SOCIETY · TIANJIN</div>
  </div>

  <form id="memberForm" action="https://formsubmit.co/zhonghuawencuhu.tj@gmail.com" method="POST">
    <!-- FormSubmit 配置 -->
    <input type="hidden" name="_subject" value="【会员登记】新会员申请">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next" value="">

    <div class="form-body">

      <!-- 基本信息 -->
      <div class="form-section">
        <div class="section-title">基本信息</div>
        <div class="form-row">
          <div class="form-group">
            <label>姓名 <span class="required">*</span></label>
            <input type="text" name="姓名" required placeholder="请输入姓名">
          </div>
          <div class="form-group">
            <label>性别 <span class="required">*</span></label>
            <div class="radio-group">
              <label><input type="radio" name="性别" value="男" required> 男</label>
              <label><input type="radio" name="性别" value="女"> 女</label>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>出生年月</label>
            <input type="date" name="出生年月">
          </div>
          <div class="form-group">
            <label>民族</label>
            <input type="text" name="民族" placeholder="如：汉族">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>政治面貌</label>
            <select name="政治面貌">
              <option value="">请选择</option>
              <option>群众</option>
              <option>中共党员</option>
              <option>中共预备党员</option>
              <option>共青团员</option>
              <option>民主党派</option>
              <option>无党派人士</option>
            </select>
          </div>
          <div class="form-group">
            <label>最高学历</label>
            <select name="最高学历">
              <option value="">请选择</option>
              <option>博士研究生</option>
              <option>硕士研究生</option>
              <option>大学本科</option>
              <option>大学专科</option>
              <option>高中/中专</option>
              <option>其他</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 联系方式 -->
      <div class="form-section">
        <div class="section-title">联系方式</div>
        <div class="form-row">
          <div class="form-group">
            <label>手机号码 <span class="required">*</span></label>
            <input type="tel" name="手机号码" required placeholder="请输入手机号" pattern="^1[3-9]\d{9}$">
          </div>
          <div class="form-group">
            <label>电子邮箱</label>
            <input type="email" name="电子邮箱" placeholder="请输入邮箱">
          </div>
        </div>
        <div class="form-group">
          <label>通讯地址</label>
          <input type="text" name="通讯地址" placeholder="请输入详细通讯地址">
        </div>
      </div>

      <!-- 职业/专业信息 -->
      <div class="form-section">
        <div class="section-title">职业信息</div>
        <div class="form-row">
          <div class="form-group">
            <label>工作单位</label>
            <input type="text" name="工作单位" placeholder="请输入工作单位">
          </div>
          <div class="form-group">
            <label>职务/职称</label>
            <input type="text" name="职务职称" placeholder="如：教授、主任等">
          </div>
        </div>
        <div class="form-group">
          <label>专业领域 <span class="required">*</span></label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="专业领域" value="文学"> 文学</label>
            <label><input type="checkbox" name="专业领域" value="书画"> 书画</label>
            <label><input type="checkbox" name="专业领域" value="音乐"> 音乐</label>
            <label><input type="checkbox" name="专业领域" value="舞蹈"> 舞蹈</label>
            <label><input type="checkbox" name="专业领域" value="戏剧"> 戏剧</label>
            <label><input type="checkbox" name="专业领域" value="影视"> 影视</label>
            <label><input type="checkbox" name="专业领域" value="民俗"> 民俗</label>
            <label><input type="checkbox" name="专业领域" value="传媒"> 传媒</label>
            <label><input type="checkbox" name="专业领域" value="教育"> 教育</label>
            <label><input type="checkbox" name="专业领域" value="其他"> 其他</label>
          </div>
        </div>
      </div>

      <!-- 会员类别 -->
      <div class="form-section">
        <div class="section-title">会员类别</div>
        <div class="form-group">
          <label>申请类别 <span class="required">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="申请类别" value="个人会员" required> 个人会员</label>
            <label><input type="radio" name="申请类别" value="单位会员"> 单位会员</label>
            <label><input type="radio" name="申请类别" value="理事会员"> 理事会员</label>
          </div>
        </div>
        <div class="form-group">
          <label>推荐人/推荐单位</label>
          <input type="text" name="推荐人" placeholder="如有推荐人请填写">
        </div>
      </div>

      <!-- 个人简介 -->
      <div class="form-section">
        <div class="section-title">补充信息</div>
        <div class="form-group">
          <label>个人简介/主要成就</label>
          <textarea name="个人简介" placeholder="请简要介绍个人经历、主要成就及社会职务等"></textarea>
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea name="备注" placeholder="其他需要说明的事项"></textarea>
        </div>
      </div>

    </div>

    <div class="form-footer">
      <button type="submit" class="submit-btn" id="submitBtn">提交登记</button>
      <div class="note">
        提交后将跳转至缴费页面，请准备好微信/支付宝。<br>
        信息将严格保密，不会向第三方泄露。
      </div>
    </div>
  </form>
</div>

<script>
// 提交后跳转到缴费页面
document.querySelector('input[name="_next"]').value = window.location.origin + window.location.pathname.replace('index.html','') + 'thankyou.html';

// 表单提交处理
document.getElementById('memberForm').addEventListener('submit', function(e) {
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';
});
</script>

</body>
</html>
